<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Creations - Homemade Baked Goods</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>🧁 Sweet Creations</h1>
            <p>Homemade with Love</p>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <section class="menu-section">
            <h2>Our Menu</h2>
            <div class="category-filters">
                <button class="filter-btn active" onclick="filterItems('all')">All</button>
                <button class="filter-btn" onclick="filterItems('cakes')">Cakes</button>
                <button class="filter-btn" onclick="filterItems('cookies')">Cookies</button>
                <button class="filter-btn" onclick="filterItems('bread')">Bread</button>
                <button class="filter-btn" onclick="filterItems('pastries')">Pastries</button>
            </div>
            <div class="menu-grid" id="menu-grid">
                <!-- Menu items will be generated by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Order</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <p class="empty-cart">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Place Order via WhatsApp</button>
        </div>
    </div>

    <!-- Order Confirmation Modal -->
    <div class="modal" id="order-modal">
        <div class="modal-content">
            <h3>Order Details</h3>
            <div id="order-details"></div>
            <div class="modal-actions">
                <button onclick="closeModal()">Continue Shopping</button>
                <button class="whatsapp-btn" onclick="sendToWhatsApp()">Send via WhatsApp</button>
            </div>
        </div>
    </div>

    <footer>
        <p>📞 Order via WhatsApp: +65 1234 5678</p>
        <p>⏰ Order 2 days in advance | Pickup at Block 123, Ang Mo Kio</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
